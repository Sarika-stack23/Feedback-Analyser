# ============================================================
# Feedback Analyser — Docker Compose
# ============================================================

version: "3.9"

services:
  feedback-analyser:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: feedback-analyser
    ports:
      - "8501:8501"
    volumes:
      - ./sample_data.csv:/app/sample_data.csv
      - ./exports:/app/exports
    environment:
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_SERVER_HEADLESS=true
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  exports: